name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  local-brain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-brain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            local-brain/package-lock.json
            brain-console/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build local-brain
        run: npm run build

      - name: Exact-answer review
        run: npm run test:exact-answer-control

      - name: Subject isolation review
        run: npm run test:subject-isolation-control

      - name: Answerable-unit review
        run: npm run test:answerable-unit-review

      - name: Temporal anchor review
        run: npm run test:temporal-anchor-review

      - name: Typed media review
        run: npm run test:typed-media-review

      - name: Causal chain review
        run: npm run test:causal-chain-review

  brain-console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain-console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            local-brain/package-lock.json
            brain-console/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint brain-console
        run: npm run lint

      - name: Build brain-console
        run: npm run build
